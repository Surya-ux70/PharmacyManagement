services:
  - type: web
    name: pharmacy-api
    runtime: docker
    dockerfilePath: PharmacyManagement.API/Dockerfile
    dockerContext: PharmacyManagement.API
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AllowedOrigins__0
        sync: false
      - key: JWT_KEY
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
