<div class="register-tenant-wrapper">
  <mat-card class="register-tenant-card">
    <mat-card-header>
      <div class="header-content">
        <mat-icon class="brand-icon">storefront</mat-icon>
        <mat-card-title>Register Your Pharmacy</mat-card-title>
        <mat-card-subtitle>Set up your pharmacy on PharmaCare</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      @if (errorMessage) {
        <div class="error-banner">
          <mat-icon>error_outline</mat-icon>
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onRegister()" #registerForm="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Pharmacy Name</mat-label>
          <input matInput name="pharmacyName" [(ngModel)]="pharmacyName" required>
          <mat-icon matPrefix>store</mat-icon>
          <mat-hint>e.g. Omega Pharmacy</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Your Full Name</mat-label>
          <input matInput name="fullName" [(ngModel)]="fullName" required>
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required email>
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 name="password" [(ngModel)]="password" required minlength="6">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-hint>Min 6 chars, uppercase, lowercase, and digit</mat-hint>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                class="full-width register-btn" [disabled]="loading || !registerForm.valid">
          @if (loading) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Register Pharmacy
          }
        </button>
      </form>

      <p class="footer-text">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
